image:
  repository: ghcr.io/laurimaila/personal-website
  tag: "1.3.2"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: traefik
  host: prod.laurimaila.com
  annotations:
    traefik.ingress.kubernetes.io/router.tls.certresolver: leresolver

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
